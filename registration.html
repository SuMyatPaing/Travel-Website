<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 flex items-center justify-center min-h-screen">
  <main class=" bg-white p-4 max-w-md mx auto rounded-lg shadow-lg">
  <div class="flex justify-center">
    <img src="image/log-in.png" alt="sign up" class="w-16 border-2 border-gray-200 shadow-md rounded-xl bg-indigo-200 p-3 mb-3">
  </div>
  <div class="text-center">
    <h1 class="font-bold text-3xl font-serif">Create Account</h1>
    <p class="text-gray-500">Join us today!It only takes a minute.</p>
  </div>
  <form action="" class="mt-6 space-y-4">
   <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
     <div>
      <label for="name"  class="font-bold">Full Name</label>
      <input type="text" name="name" id="name" placeholder="John Doe" class="w-full border-2 border-gray-200 bg-gray-100 rounded-md shadow-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>
    <div>
      <label for="email" id="email" class="font-bold ">Email Address</label>
      <input type="email" name="email" placeholder="name@company.com" class="w-full border-2 border-gray-200 bg-gray-100 rounded-md shadow-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>
</div>

<!-- password -->
<div>
<label for="password"  class="font-bold">Password</label>
      <input type="password" name="password" id="password" placeholder="......." class=" w-full border-2 border-gray-200 bg-gray-100 rounded-md shadow-md p-2 focus:outline-none focus:ring-2 focus:ring-blue:100" minlength="8" required>
    </div>
    <!-- confirm password -->
    <div>
      <label for="confirmPassword"  class="font-bold">Confirm Password</label>
      <input type="password" name="confirmPassword" id="confirmPassword" placeholder="......." class=" w-full border-2 border-gray-200 bg-gray-100 rounded-md shadow-md p-2 focus:outline-none focus:ring-2 focus:ring-blue:100" required minlength="8">
    </div>
    <div class="flex gap-2">
      <input type="checkbox" name="check" id="check" required>
      <label for="check" class="text-gray-500 w-full">I agree to the <a href="terms.html" class="underline text-violet-500 font-bold">Terms of
          Service</a> and <a href="policy.html" class="underline text-violet-500 font-bold">Privacy Policy.</a></label>
    </div>
    
      <button type="submit" class="bg-indigo-600 text-white font-bold rounded-lg shadow-md w-full py-3 mb-3">Create MyAccount >></button>
    
  </form>

  <p class="text-gray-500 mt-5 text-center">Already have an account?
  <a href="login.html" class="font-bold text-violet-600">Sign in here</a></p>
 
   </main>
</body>
</html>
