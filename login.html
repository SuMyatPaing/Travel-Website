<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100 flex items-center justify-center min-h-screen">
    <section class="max-w-md border-2 border-gray-300 rounded-xl shadow-2xl p-6">
        <div class="flex justify-center">
            <img src="image/locked.png" alt="login" class="w-16 border-2 border-gray-200 shadow-md rounded-xl bg-indigo-200 p-3">
        </div>
        <div class="text-center">
            <h1 class="font-bold text-3xl font-serif">Welcome Back</h1>
            <p class="text-gray-500">Enter your credentials to access your account</p>
        </div>
        <form action="">
            <div class="flex flex-col">
                <label for="email" id="email" class="font-bold">Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" class="w-full border-2 border-gray-200 bg-gray-100 rounded-md shadow-md p-2" required>
            </div>
            </div>
            <!-- password -->
            <div class="flex flex-col">
                <label for="password" id="password" class="font-bold">Password</label>
                <input type="password" name="password" placeholder="......." class="border-2 border-gray-200 bg-gray-100 rounded-md shadow-md p-2" minlength="8" required>
            </div>
            <!-- checkbox  -->
            <div class="flex justify-between">

                <div>
                    <input type="checkbox" name="check" id="check" required>
                    <label for="check">Remember me</label>
                </div>
                <div>
                    <p class="text-blue-500">Forgot password?</p>
                </div>
            </div>
            <!-- button -->
 <button type="submit" class="bg-indigo-600 text-white font-bold rounded-lg shadow-md w-full ">Log In</button>
</form>
        <!-- footer -->
         <div class="flex">
            <p class="text-gray-500">Don't have an account yet?</p>
            <a href="registration.html" class="font-bold text-violet-600">Sign up for free</a>
        </div>
    </section>
</body>

</html>
